<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMILCAR — Pack configuré</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --gold: #c8a951; --bg-dark: #1a1a2e; --bg-card: #16213e; --text-primary: #e8e8e8; --text-muted: #a0a0b0; --border-color: #2a2a4a; --radius: 12px; --green: #4ade80; }
        body { background: var(--bg-dark); color: var(--text-primary); font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .success-card { background: var(--bg-card); border: 2px solid var(--green); border-radius: var(--radius); padding: 50px 40px; text-align: center; max-width: 500px; }
    </style>
</head>
<body>
<div class="success-card">
    <div style="font-size:60px;margin-bottom:16px">🎉</div>
    <h2 style="color:var(--green);font-weight:700">Pack configuré !</h2>
    <p style="color:var(--text-muted);margin-top:12px;font-size:.9rem">
        Merci <strong style="color:var(--gold)">{{ name }}</strong> !
    </p>
    <div style="background:var(--bg-dark);border-radius:var(--radius);padding:16px;margin:16px 0">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="color:var(--text-muted)">Total pack :</span>
            <strong style="color:var(--gold);font-size:1.2rem">{{ '{:,.0f}'.format(total) }} DH</strong>
        </div>
        {% if discount > 0 %}
        <div style="display:flex;justify-content:space-between">
            <span style="color:var(--green)">Remise obtenue :</span>
            <strong style="color:var(--green)">-{{ discount }}%</strong>
        </div>
        {% endif %}
    </div>
    <p style="color:var(--text-muted);font-size:.85rem">
        Notre équipe vous contactera pour finaliser votre pack personnalisé.
    </p>
    <a href="/pack_configurator" style="display:inline-block;margin-top:20px;padding:10px 24px;background:var(--gold);color:#000;font-weight:600;border-radius:8px;text-decoration:none">Nouvelle configuration</a>
</div>
</body>
</html>
