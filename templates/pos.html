{% extends "base.html" %}
{% block title %}Caisse POS{% endblock %}
{% block content %}
<style>
    .pos-container { display:grid; grid-template-columns:1fr 380px; gap:20px; min-height:calc(100vh - 80px); }
    .pos-services { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
    .pos-svc-btn { border:2px solid var(--border); border-radius:12px; padding:15px 10px; text-align:center; 
        cursor:pointer; transition:all .2s; background:var(--card-bg); }
    .pos-svc-btn:hover, .pos-svc-btn.selected { border-color:var(--primary); background:rgba(37,99,235,.1); transform:scale(1.02); }
    .pos-svc-btn .price { font-size:1.3rem; font-weight:bold; color:var(--primary); }
    .pos-svc-btn .name { font-size:.85rem; margin-top:4px; }
    .pos-cart { background:var(--card-bg); border-radius:16px; padding:20px; border:1px solid var(--border); 
        display:flex; flex-direction:column; position:sticky; top:80px; }
    .pos-total { font-size:2rem; font-weight:bold; color:var(--primary); text-align:center; padding:15px 0; 
        border-top:2px solid var(--border); border-bottom:2px solid var(--border); margin:10px 0; }
    .pay-btn { padding:15px; font-size:1.2rem; border-radius:12px; border:none; cursor:pointer; font-weight:bold; }
    .pay-cash { background:#22c55e; color:white; }
    .pay-card { background:#3b82f6; color:white; }
    .pay-split { background:#f59e0b; color:white; }
    .split-panel { display:none; background:var(--bg); border-radius:12px; padding:15px; margin-top:10px; }
    @media(max-width:768px) { .pos-container { grid-template-columns:1fr; } }
</style>

<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>💳 Caisse Rapide (POS)</h2>
        <a href="/end_of_day" class="btn btn-outline-secondary">📊 Bilan</a>
    </div>

    <form method="POST" action="/pos/checkout" id="posForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="pos-container">
            <!-- Left: Services + Customer -->
            <div>
                <!-- Customer/Car Selection -->
                <div class="card p-3 mb-3">
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="form-label">👤 Client</label>
                            <select name="customer_id" id="customerSelect" class="form-select" onchange="filterCars()" required>
                                <option value="">-- Sélectionner --</option>
                                {% for c in customers %}
                                <option value="{{ c.id }}">{{ c.name }} ({{ c.phone }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">🚗 Véhicule</label>
                            <select name="car_id" id="carSelect" class="form-select" required>
                                <option value="">-- Sélectionner --</option>
                                {% for c in cars %}
                                <option value="{{ c.id }}" data-customer="{{ c.customer_id }}">{{ c.plate }} - {{ c.brand }} {{ c.model }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Services Grid -->
                <h5 class="mb-2">Choisir le service :</h5>
                <div class="pos-services">
                    {% for s in services %}
                    <div class="pos-svc-btn" onclick="selectService('{{ s.name }}', {{ s.price }}, this)">
                        <div class="price">{{ "%.0f"|format(s.price) }} DT</div>
                        <div class="name">{{ s.name }}</div>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <!-- Right: Cart -->
            <div class="pos-cart">
                <h4 class="text-center mb-3">🧾 Ticket</h4>
                
                <div id="cartItem" style="display:none" class="mb-3">
                    <div class="d-flex justify-content-between">
                        <span id="cartServiceName" style="font-weight:500"></span>
                        <span id="cartServicePrice" style="font-weight:bold;color:var(--primary)"></span>
                    </div>
                </div>
                
                <input type="hidden" name="service" id="serviceInput">
                
                <div class="mb-3">
                    <label class="form-label">Montant (DT)</label>
                    <input type="number" name="amount" id="amountInput" class="form-control form-control-lg text-center" 
                        step="0.5" min="1" required style="font-size:1.5rem;font-weight:bold">
                </div>

                <div class="pos-total" id="totalDisplay">0 DT</div>

                <!-- Payment Buttons -->
                <div class="d-grid gap-2 mt-auto">
                    <button type="submit" class="pay-btn pay-cash" onclick="setPayment('cash')">💵 Espèces</button>
                    <button type="submit" class="pay-btn pay-card" onclick="setPayment('card')">💳 Carte</button>
                    <button type="button" class="pay-btn pay-split" onclick="toggleSplit()">✂️ Paiement Divisé</button>
                </div>

                <input type="hidden" name="payment_method" id="paymentMethod" value="cash">
                
                <!-- Split Payment Panel -->
                <div class="split-panel" id="splitPanel">
                    <h6>Paiement Divisé</h6>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <label class="form-label small">Mode 1</label>
                            <select name="payment_method" id="splitMethod1" class="form-select form-select-sm">
                                <option value="cash">Espèces</option>
                                <option value="card">Carte</option>
                                <option value="transfer">Virement</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label small">Montant 1</label>
                            <input type="number" name="amount1" class="form-control form-control-sm" step="0.5" min="0">
                        </div>
                    </div>
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label small">Mode 2</label>
                            <select name="payment_method2" class="form-select form-select-sm">
                                <option value="card">Carte</option>
                                <option value="cash">Espèces</option>
                                <option value="transfer">Virement</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label small">Montant 2</label>
                            <input type="number" name="amount2" class="form-control form-control-sm" step="0.5" min="0">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 mt-2" onclick="setPayment('split')">✅ Valider Paiement Divisé</button>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
function selectService(name, price, el) {
    document.querySelectorAll('.pos-svc-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('serviceInput').value = name;
    document.getElementById('amountInput').value = price;
    document.getElementById('cartItem').style.display = 'block';
    document.getElementById('cartServiceName').textContent = name;
    document.getElementById('cartServicePrice').textContent = price + ' DT';
    updateTotal();
}

function updateTotal() {
    const amount = parseFloat(document.getElementById('amountInput').value) || 0;
    document.getElementById('totalDisplay').textContent = amount.toFixed(0) + ' DT';
}
document.getElementById('amountInput').addEventListener('input', updateTotal);

function setPayment(method) {
    document.getElementById('paymentMethod').value = method;
}

function toggleSplit() {
    const panel = document.getElementById('splitPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function filterCars() {
    const customerId = document.getElementById('customerSelect').value;
    const carSelect = document.getElementById('carSelect');
    Array.from(carSelect.options).forEach(opt => {
        if (!opt.value) return;
        opt.style.display = (!customerId || opt.dataset.customer === customerId) ? '' : 'none';
    });
    carSelect.value = '';
}
</script>
{% endblock %}
