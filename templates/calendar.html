{% extends "base.html" %}
{% block title %} - Calendrier{% endblock %}
{% block head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet">
<style>
    .fc { background: var(--bg-card-solid); border-radius: var(--radius); padding: 10px; }
    .fc .fc-toolbar-title { color: var(--gold); font-family: var(--font-display); letter-spacing: 2px; font-size: 1.1rem; }
    .fc .fc-button { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--gold); font-family: var(--font-body); font-size: 0.7rem; letter-spacing: 1px; }
    .fc .fc-button:hover { background: var(--gold); color: var(--bg-primary); }
    .fc .fc-button-active { background: var(--gold) !important; color: var(--bg-primary) !important; }
    .fc .fc-daygrid-day { border-color: var(--border-subtle); }
    .fc .fc-daygrid-day-number { color: var(--text-secondary); font-family: var(--font-body); font-size: 0.8rem; }
    .fc .fc-col-header-cell-cushion { color: var(--gold); font-family: var(--font-body); font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; }
    .fc .fc-daygrid-day.fc-day-today { background: var(--gold-glow) !important; }
    .fc .fc-event { font-size: 0.7rem; padding: 2px 4px; border: none; border-radius: 3px; cursor: grab; }
    .fc .fc-more-link { color: var(--gold); font-size: 0.7rem; }
    .fc th { border-color: var(--border-color); }
    .fc td { border-color: var(--border-subtle); }
    .fc-toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: var(--radius-sm); color: white; font-family: var(--font-body); font-size: 0.8rem; z-index: 9999; animation: fadeInUp 0.3s var(--ease); }
    .fc-toast-success { background: var(--green); }
    .fc-toast-error { background: var(--red); }
</style>
{% endblock %}
{% block content %}
    <div class="mb-4">
        <p class="page-title mb-1">Calendrier des Rendez-vous</p>
        <p class="page-subtitle mb-0">Glissez-déposez un rendez-vous pour le reprogrammer</p>
    </div>
    <div id="calendar"></div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
<script>
function showToast(msg, type) {
    var t = document.createElement('div');
    t.className = 'fc-toast fc-toast-' + type;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
}
document.addEventListener('DOMContentLoaded', function() {
    var cal = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,dayGridWeek' },
        events: '/api/appointments_calendar',
        editable: true,
        droppable: true,
        eventClick: function(info) {
            window.location.href = '/edit_appointment/' + info.event.id;
        },
        eventDrop: function(info) {
            var newDate = info.event.start.toISOString().split('T')[0];
            var newTime = '';
            if (info.event.start.getHours() > 0 || info.event.start.getMinutes() > 0) {
                newTime = info.event.start.toTimeString().substring(0, 5);
            }
            var status = info.event.extendedProps.status;
            if (status === 'completed' || status === 'cancelled') {
                info.revert();
                showToast('Impossible de déplacer un RDV terminé/annulé', 'error');
                return;
            }
            fetch('/api/reschedule_appointment', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}'},
                body: JSON.stringify({id: info.event.id, date: newDate, time: newTime})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showToast('Rendez-vous déplacé au ' + newDate, 'success');
                } else {
                    info.revert();
                    showToast(data.error || 'Erreur', 'error');
                }
            })
            .catch(function() { info.revert(); showToast('Erreur réseau', 'error'); });
        },
        height: 'auto',
        firstDay: 1
    });
    cal.render();
});
</script>
{% endblock %}
