{% extends "base.html" %}
{% block title %} - Calendrier{% endblock %}
{% block head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet">
<style>
    .fc { background: #111; border-radius: 8px; padding: 10px; }
    .fc .fc-toolbar-title { color: #D4AF37; font-family: 'Cinzel', serif; letter-spacing: 3px; font-size: 1.1rem; }
    .fc .fc-button { background: #1a1a2e; border: 1px solid #D4AF37; color: #D4AF37; font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 1px; }
    .fc .fc-button:hover { background: #D4AF37; color: #0d0d0d; }
    .fc .fc-button-active { background: #D4AF37 !important; color: #0d0d0d !important; }
    .fc .fc-daygrid-day { border-color: #222; }
    .fc .fc-daygrid-day-number { color: #888; font-family: 'Cinzel', serif; font-size: 0.8rem; }
    .fc .fc-col-header-cell-cushion { color: #D4AF37; font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 2px; }
    .fc .fc-daygrid-day.fc-day-today { background: rgba(212,175,55,0.08) !important; }
    .fc .fc-event { font-size: 0.7rem; padding: 2px 4px; border: none; border-radius: 3px; cursor: grab; }
    .fc .fc-more-link { color: #D4AF37; font-size: 0.7rem; }
    .fc th { border-color: #333; }
    .fc td { border-color: #1a1a2e; }
    .fc-toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: white; font-family: Cinzel; font-size: 0.8rem; z-index: 9999; animation: fadeIn 0.3s; }
    .fc-toast-success { background: #2d6a4f; border: 1px solid #40916c; }
    .fc-toast-error { background: #C41E3A; border: 1px solid #ff4444; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
{% block content %}
    <p class="page-title mb-4">CALENDRIER DES RENDEZ-VOUS</p>
    <p style="color:#888;font-size:0.75rem;text-align:center;margin-bottom:15px">💡 Glissez-déposez un rendez-vous pour le reprogrammer</p>
    <div id="calendar"></div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
<script>
function showToast(msg, type) {
    var t = document.createElement('div');
    t.className = 'fc-toast fc-toast-' + type;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
}
document.addEventListener('DOMContentLoaded', function() {
    var cal = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,dayGridWeek' },
        events: '/api/appointments_calendar',
        editable: true,
        droppable: true,
        eventClick: function(info) {
            window.location.href = '/edit_appointment/' + info.event.id;
        },
        eventDrop: function(info) {
            var newDate = info.event.start.toISOString().split('T')[0];
            var newTime = '';
            if (info.event.start.getHours() > 0 || info.event.start.getMinutes() > 0) {
                newTime = info.event.start.toTimeString().substring(0, 5);
            }
            var status = info.event.extendedProps.status;
            if (status === 'completed' || status === 'cancelled') {
                info.revert();
                showToast('Impossible de déplacer un RDV terminé/annulé', 'error');
                return;
            }
            fetch('/api/reschedule_appointment', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}'},
                body: JSON.stringify({id: info.event.id, date: newDate, time: newTime})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showToast('Rendez-vous déplacé au ' + newDate, 'success');
                } else {
                    info.revert();
                    showToast(data.error || 'Erreur', 'error');
                }
            })
            .catch(function() { info.revert(); showToast('Erreur réseau', 'error'); });
        },
        height: 'auto',
        firstDay: 1
    });
    cal.render();
});
</script>
{% endblock %}
