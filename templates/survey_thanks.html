<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMILCAR — Merci</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',sans-serif;background:#f8f9fa;color:#333;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .thanks-card{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.08);padding:50px;max-width:450px;width:100%;text-align:center}
        .brand{font-family:'Playfair Display',serif;color:#B8860B;font-size:1.6rem;margin-bottom:20px}
        .check{font-size:4rem;margin-bottom:15px}
    </style>
</head>
<body>
    <div class="thanks-card">
        <div class="brand">AMILCAR</div>
        <div class="check">✅</div>
        <h4 style="color:var(--green);margin-bottom:10px">Merci pour votre avis !</h4>
        <p style="color:var(--text-secondary);font-size:0.9rem">Votre retour nous aide à améliorer continuellement nos services.</p>
        <p style="color:#B8860B;font-weight:600;margin-top:20px">À bientôt chez AMILCAR !</p>
    </div>
</body>
</html>
