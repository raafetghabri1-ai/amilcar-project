<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMILCAR — Notifications</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root{--gold:#D4AF37;--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--text:#f0f0f0;--muted:#888;--border:#2a2a2a;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--radius:16px}
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:90px}
        .top-bar{background:var(--bg2);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
        .top-bar h2{color:var(--gold);font-size:1.1rem;font-weight:700;margin:0}
        .top-bar a{color:var(--muted);text-decoration:none;font-size:1.2rem}
        .container-c{max-width:500px;margin:0 auto;padding:16px}
        .notif-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
        .notif-card.unread{border-left:3px solid var(--gold)}
        .notif-title{font-size:.88rem;font-weight:700;margin-bottom:4px}
        .notif-msg{font-size:.78rem;color:var(--muted);line-height:1.4}
        .notif-time{font-size:.65rem;color:var(--muted);margin-top:8px}
        .nav-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 12px;z-index:100}
        .nav-bottom a{color:var(--muted);text-decoration:none;text-align:center;font-size:.55rem;padding:4px 8px}
        .nav-bottom a .ico{font-size:1.2rem;display:block;margin-bottom:2px}
        .nav-bottom a.active{color:var(--gold)}
    </style>
</head>
<body>
<div class="top-bar">
    <a href="/espace-client/accueil">←</a>
    <h2>🔔 Notifications</h2>
    <span style="width:20px"></span>
</div>

<div class="container-c">
    {% for n in notifs %}
    <div class="notif-card {{ 'unread' if not n.is_read }}">
        <div class="notif-title">{{ n.title }}</div>
        <div class="notif-msg">{{ n.message }}</div>
        <div class="notif-time">{{ n.created_at }}</div>
        {% if n.appointment_id %}
        <a href="/espace-client/suivi/{{ n.appointment_id }}" style="color:var(--gold);font-size:.72rem;margin-top:6px;display:inline-block">Voir le suivi →</a>
        {% endif %}
    </div>
    {% else %}
    <div style="text-align:center;padding:50px 20px">
        <div style="font-size:3rem;margin-bottom:12px">🔔</div>
        <p style="color:var(--muted)">Aucune notification</p>
    </div>
    {% endfor %}
</div>

<div class="nav-bottom">
    <a href="/espace-client/accueil"><span class="ico">🏠</span>Accueil</a>
    <a href="/espace-client/vehicules"><span class="ico">🚗</span>Véhicules</a>
    <a href="/espace-client/reserver"><span class="ico">📅</span>Réserver</a>
    <a href="/espace-client/factures"><span class="ico">📄</span>Factures</a>
    <a href="/espace-client/fidelite"><span class="ico">🎁</span>Fidélité</a>
</div>
</body>
</html>
