{% extends "base.html" %}
{% block title %} - Nouveau Rendez-vous{% endblock %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h4 class="mb-4" style="color:#D4AF37;letter-spacing:3px">NOUVEAU RENDEZ-VOUS</h4>
                <form method="POST" enctype="multipart/form-data">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label class="form-label">CLIENT</label>
                        <select id="customer_select" class="form-control" onchange="filterCars()">
                            <option value="">-- Sélectionner Client --</option>
                            {% for c in customers %}
                            <option value="{{ c[0] }}">{{ c[1] }} — {{ c[2] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">VOITURE</label>
                        <select name="car_id" id="car_select" class="form-control" required>
                            <option value="">-- Sélectionner Voiture --</option>
                            {% for car in cars %}
                            <option value="{{ car[0] }}" data-customer="{{ car[1] }}">{{ car[2] }} {{ car[3] }} — {{ car[4] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">DATE</label>
                        <input type="date" name="date" id="apptDate" class="form-control" required onchange="checkSlots()">
                        <div id="slotsInfo" style="display:none;margin-top:5px"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">HEURE</label>
                        <input type="time" name="time" id="apptTime" class="form-control" style="background:#1a1a2e;color:#f0f0f0;border:1px solid #333">
                        <small style="color:#555;font-size:0.65rem">Optionnel — évite les doubles réservations</small>
                        <div id="availableSlots" style="display:none;margin-top:5px;display:flex;flex-wrap:wrap;gap:4px"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">SERVICE</label>
                        <select name="service" class="form-control" required>
                            {% for name, price in services %}
                            <option value="{{ name }}{% if price %} - {{ price }} DT{% endif %}">{{ name }}{% if price %} — {{ price }} DT{% endif %}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ASSIGNÉ À</label>
                        <select name="assigned_to" class="form-control">
                            <option value="">— Non Assigné —</option>
                            {% for t in technicians %}
                            <option value="{{ t[0] }}">{{ t[1] if t[1] else t[0] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">PHOTOS (AVANT)</label>
                        <input type="file" name="photos_before" multiple accept="image/*" class="form-control" style="background:#1a1a2e;color:#f0f0f0;border:1px solid #333">
                        <small style="color:#555;font-size:0.65rem">Optionnel — télécharger photos avant</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">RÉCURRENCE</label>
                        <select name="repeat" id="repeatSelect" class="form-control" onchange="toggleRepeatCount()">
                            <option value="">— Aucune —</option>
                            <option value="weekly">Hebdomadaire</option>
                            <option value="biweekly">Bihebdomadaire</option>
                            <option value="monthly">Mensuel</option>
                        </select>
                    </div>
                    <div class="mb-3" id="repeatCountDiv" style="display:none">
                        <label class="form-label">NOMBRE DE RÉPÉTITIONS</label>
                        <input type="number" name="repeat_count" class="form-control" value="4" min="2" max="52">
                        <small style="color:#555;font-size:0.65rem">Nombre total de rendez-vous à créer</small>
                    </div>
                    <button type="submit" class="btn btn-gold w-100">AJOUTER RENDEZ-VOUS</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
{% block scripts %}
<script>
function filterCars() {
    var customerId = document.getElementById('customer_select').value;
    var carSelect = document.getElementById('car_select');
    var options = carSelect.querySelectorAll('option[data-customer]');
    options.forEach(function(opt) {
        opt.style.display = (!customerId || opt.getAttribute('data-customer') === customerId) ? '' : 'none';
    });
    carSelect.value = '';
}
function toggleRepeatCount() {
    document.getElementById('repeatCountDiv').style.display = document.getElementById('repeatSelect').value ? 'block' : 'none';
}
function checkSlots() {
    var date = document.getElementById('apptDate').value;
    if (!date) return;
    fetch('/api/available_slots?date=' + date).then(r => r.json()).then(data => {
        var info = document.getElementById('slotsInfo');
        info.style.display = 'block';
        if (data.full) {
            info.innerHTML = '<span style="color:#C41E3A;font-size:0.75rem;font-weight:600">⚠️ Journée complète (' + data.total_booked + '/' + data.max_daily + ')</span>';
        } else {
            info.innerHTML = '<span style="color:#22c55e;font-size:0.75rem">✅ ' + data.total_booked + '/' + data.max_daily + ' réservés</span>';
        }
        var slotsDiv = document.getElementById('availableSlots');
        slotsDiv.style.display = 'flex';
        slotsDiv.innerHTML = '';
        data.slots.forEach(function(s) {
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.textContent = s.time;
            btn.style.cssText = 'font-size:0.6rem;padding:2px 6px;border-radius:4px;border:1px solid #333;cursor:pointer;' +
                (s.available ? 'background:#1a1a2e;color:#22c55e' : 'background:#333;color:#666;text-decoration:line-through;cursor:not-allowed');
            if (s.available) {
                btn.onclick = function() {
                    document.getElementById('apptTime').value = s.time;
                    slotsDiv.querySelectorAll('button').forEach(b => b.style.borderColor = '#333');
                    btn.style.borderColor = '#D4AF37';
                };
            }
            slotsDiv.appendChild(btn);
        });
    });
}
</script>
{% endblock %}
