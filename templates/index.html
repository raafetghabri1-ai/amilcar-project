<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>amilcar - مركز عناية السيارات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .hero { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 60px 0; text-align: center; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .stat-icon { font-size: 50px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1 class="display-4">🚗 مركز amilcar لعناية السيارات</h1>
        <p class="lead">نظام الإدارة المتكامل</p>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#16213e">
        <div class="container">
            <div class="navbar-nav mx-auto">
                <a class="nav-link text-white" href="/">🏠 الرئيسية</a>
                <a class="nav-link text-white" href="/customers">👤 العملاء</a>
                <a class="nav-link text-white" href="/appointments">📅 المواعيد</a>
                <a class="nav-link text-white" href="/invoices">💰 الفواتير</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <div class="stat-icon text-primary">👤</div>
                    <h2 class="display-4 fw-bold">{{ stats.customers }}</h2>
                    <p class="text-muted">إجمالي العملاء</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <div class="stat-icon text-success">📅</div>
                    <h2 class="display-4 fw-bold">{{ stats.appointments }}</h2>
                    <p class="text-muted">إجمالي المواعيد</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <div class="stat-icon text-warning">💰</div>
                    <h2 class="display-4 fw-bold">{{ stats.revenue }}</h2>
                    <p class="text-muted">الإيرادات (دينار)</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
