<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMILCAR Auto Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0d0d0d; color: #f0f0f0; font-family: 'Cinzel', serif; margin: 0; }
        .hero { background: linear-gradient(135deg, #1a1a2e, #0d0d0d); border-bottom: 2px solid #D4AF37; padding: 60px 0; text-align: center; }
        .hero h1 { color: #D4AF37; font-size: 3.5rem; font-weight: 900; letter-spacing: 6px; margin: 0; }
        .hero .tagline { color: #C41E3A; letter-spacing: 4px; font-size: 0.9rem; margin-top: 8px; }
        .hero .sub { color: #555; font-size: 0.7rem; letter-spacing: 3px; margin-top: 4px; }
        .navbar { background: #1a1a2e !important; border-bottom: 1px solid #D4AF37; }
        .nav-link { color: #D4AF37 !important; letter-spacing: 2px; font-size: 0.8rem; padding: 15px 20px !important; }
        .nav-link:hover { color: #C41E3A !important; }
        .stat-card { background: #1a1a2e; border: 1px solid #D4AF37; border-radius: 8px; padding: 40px 20px; text-align: center; }
        .stat-card h2 { color: #D4AF37; font-size: 3rem; font-weight: 900; margin: 0; }
        .stat-card p { color: #888; letter-spacing: 3px; font-size: 0.7rem; margin-top: 8px; }
        .btn-gold { background: #D4AF37; color: #0d0d0d; border: none; font-family: 'Cinzel'; letter-spacing: 2px; font-weight: 700; padding: 12px; border-radius: 4px; }
        .btn-gold:hover { background: #C41E3A; color: white; }
        .divider { border-color: #D4AF37; opacity: 0.3; margin: 40px 0; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>AMILCAR</h1>
        <p class="tagline">WHERE CARS BECOME ART</p>
        <p class="sub">AUTO CARE &mdash; MAHRES, SFAX</p>
    </div>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-nav mx-auto d-flex flex-row">
                <a class="nav-link" href="/">HOME</a>
                <a class="nav-link" href="/customers">CLIENTS</a>
                <a class="nav-link" href="/appointments">APPOINTMENTS</a>
                <a class="nav-link" href="/invoices">INVOICES</a>
                <a class="nav-link" href="/quotes">QUOTES</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="stat-card">
                    <h2>{{ stats.customers }}</h2>
                    <p>CLIENTS</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h2>{{ stats.appointments }}</h2>
                    <p>APPOINTMENTS</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h2>{{ stats.revenue }}</h2>
                    <p>REVENUE (DT)</p>
                </div>
            </div>
        </div>
        <hr class="divider">
        <div class="row g-3">
            <div class="col-md-4">
                <a href="/add_customer" class="btn btn-gold w-100">+ NEW CLIENT</a>
            </div>
            <div class="col-md-4">
                <a href="/add_appointment" class="btn btn-gold w-100">+ NEW APPOINTMENT</a>
            </div>
            <div class="col-md-4">
                <a href="/add_invoice" class="btn btn-gold w-100">+ NEW INVOICE</a>
            </div>
        </div>
    </div>
</body>
</html>
