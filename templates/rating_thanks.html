<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci - AMILCAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f6f9; color: #333; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .thanks { text-align: center; max-width: 420px; padding: 50px 40px; background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .check-circle { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #e8f5e9, #c8e6c9); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .check-circle span { font-size: 2.5rem; }
        .thanks h3 { color: #1a1a2e; font-weight: 700; margin-bottom: 12px; font-size: 1.3rem; }
        .thanks p { color: #888; font-size: 0.9rem; line-height: 1.6; }
        .brand { margin-top: 25px; padding-top: 20px; border-top: 1px solid #f0f0f0; }
        .brand span { color: #D4AF37; font-weight: 800; font-size: 1rem; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="thanks">
        <div class="check-circle"><span>✅</span></div>
        <h3>Merci pour votre évaluation !</h3>
        <p>Votre avis est précieux et nous aide à améliorer nos services.</p>
        <div class="brand"><span>AMILCAR</span><br><small style="color:#aaa;font-size:0.7rem;letter-spacing:3px">AUTO CARE</small></div>
    </div>
</body>
</html>
