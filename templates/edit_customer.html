{% extends "base.html" %}
{% block title %} - Modifier Client{% endblock %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h4 class="mb-4" >MODIFIER CLIENT</h4>
                <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label class="form-label">NOM</label>
                        <input type="text" name="name" class="form-control" value="{{ customer[1] }}" required minlength="2" maxlength="100">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">TÉLÉPHONE</label>
                        <input type="tel" name="phone" class="form-control" value="{{ customer[2] }}" required pattern="[0-9+\s\-]{4,20}" title="Entrez un numéro de téléphone valide">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">EMAIL</label>
                        <input type="email" name="email" class="form-control" value="{{ customer[4] if customer|length > 4 and customer[4] else '' }}" placeholder="email@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">NOTES</label>
                        <textarea name="notes" class="form-control" rows="3" placeholder="Demandes spéciales, préférences, etc.">{{ customer[3] or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn-gold w-100">ENREGISTRER</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
