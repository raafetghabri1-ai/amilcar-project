{% extends "base.html" %}
{% block title %} - Changer le mot de passe{% endblock %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <h4 class="mb-4" >CHANGER MOT DE PASSE</h4>
                <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label class="form-label">MOT DE PASSE ACTUEL</label>
                        <div class="position-relative">
                            <input type="password" name="current_password" id="pwd1" class="form-control" required style="padding-right:45px">
                            <span onclick="togglePwd('pwd1', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text-secondary);font-size:1.1rem;user-select:none">👁</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">NOUVEAU MOT DE PASSE</label>
                        <div class="position-relative">
                            <input type="password" name="new_password" id="pwd2" class="form-control" required minlength="6" style="padding-right:45px">
                            <span onclick="togglePwd('pwd2', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text-secondary);font-size:1.1rem;user-select:none">👁</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">CONFIRMER MOT DE PASSE</label>
                        <div class="position-relative">
                            <input type="password" name="confirm_password" id="pwd3" class="form-control" required minlength="6" style="padding-right:45px">
                            <span onclick="togglePwd('pwd3', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text-secondary);font-size:1.1rem;user-select:none">👁</span>
                        </div>
                    </div>
                    <button type="submit" class="btn-gold w-100">CHANGER MOT DE PASSE</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
{% block scripts %}
<script>
function togglePwd(id, el) {
    var f = document.getElementById(id);
    if (f.type === 'password') { f.type = 'text'; el.textContent = '🔒'; }
    else { f.type = 'password'; el.textContent = '👁'; }
}
</script>
{% endblock %}
