<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMILCAR - Quote Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0d0d0d; color: #f0f0f0; font-family: 'Cinzel', serif; margin: 0; }
        .hero { background: linear-gradient(135deg, #1a1a2e, #0d0d0d); border-bottom: 2px solid #D4AF37; padding: 60px 0; text-align: center; }
        .hero h1 { color: #D4AF37; font-size: 3.5rem; font-weight: 900; letter-spacing: 6px; margin: 0; }
        .hero .tagline { color: #C41E3A; letter-spacing: 4px; font-size: 0.9rem; margin-top: 8px; }
        .navbar { background: #1a1a2e !important; border-bottom: 1px solid #D4AF37; }
        .nav-link { color: #D4AF37 !important; letter-spacing: 2px; font-size: 0.8rem; padding: 15px 20px !important; }
        .nav-link:hover { color: #C41E3A !important; }
        .card { background: #1a1a2e; border: 1px solid #D4AF37; border-radius: 8px; }
        .form-control { background: #0d0d0d; border: 1px solid #444; color: #f0f0f0; font-family: 'Cinzel'; }
        .form-control:focus { background: #0d0d0d; border-color: #D4AF37; color: #f0f0f0; box-shadow: none; }
        .form-label { color: #D4AF37; letter-spacing: 2px; font-size: 0.8rem; }
        .btn-gold { background: #D4AF37; color: #0d0d0d; border: none; font-family: 'Cinzel'; letter-spacing: 2px; font-weight: 700; padding: 12px; border-radius: 4px; }
        .btn-gold:hover { background: #C41E3A; color: white; }
        .service-note { color: #888; font-size: 0.7rem; letter-spacing: 1px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>AMILCAR</h1>
        <p class="tagline">WHERE CARS BECOME ART</p>
    </div>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-nav mx-auto d-flex flex-row">
                <a class="nav-link" href="/">HOME</a>
                <a class="nav-link" href="/customers">CLIENTS</a>
                <a class="nav-link" href="/appointments">APPOINTMENTS</a>
                <a class="nav-link" href="/invoices">INVOICES</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h4 class="mb-4" style="color:#D4AF37;letter-spacing:3px">REQUEST A QUOTE</h4>
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">NAME</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">PHONE</label>
                            <input type="text" name="phone" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">SERVICE</label>
                            <select name="service" class="form-control">
                                <option value="Detailing">Detailing (from 100 DT)</option>
                                <option value="Polissage">Polissage / Lustrage (from 350 DT)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">PHOTOS</label>
                            <input type="file" name="photos" class="form-control" multiple accept="image/*" required>
                            <p class="service-note">Upload photos of your car — front, back, sides, and any damage areas</p>
                        </div>
                        <button type="submit" class="btn btn-gold w-100">SEND REQUEST</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
