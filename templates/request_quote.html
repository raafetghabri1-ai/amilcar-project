{% extends "base.html" %}
{% block title %} - Demander un Devis{% endblock %}
{% block content %}
    <p class="page-title">Demander un Devis</p>
    <form method="POST" enctype="multipart/form-data" style="max-width:600px;animation:fadeInUp 0.5s ease">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="mb-3">
            <label class="form-label">Nom complet</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Téléphone</label>
            <input type="tel" name="phone" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Service souhaité</label>
            <input type="text" name="service" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Photos</label>
            <input type="file" name="photos" class="form-control" multiple accept="image/*">
            <small style="color:var(--text-dim)">Plusieurs fichiers acceptés</small>
        </div>
        <button type="submit" class="btn-gold w-100" style="padding:12px">Envoyer la Demande</button>
    </form>
{% endblock %}
