<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe — AMILCAR</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.min.css?v={{ asset_hash('style.min.css') }}" rel="stylesheet">
    <style>
        .reset-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
        }
        .reset-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.35);
        }
        .reset-card::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.5;
        }
        .reset-title {
            color: var(--text-primary);
            font-family: var(--font-display);
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        .reset-user {
            text-align: center;
            color: var(--gold);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }
        @media (max-width: 480px) {
            .reset-card { padding: 36px 24px; margin: 0 16px; }
        }
    </style>
</head>
<body>
    <div class="reset-page">
        <div class="reset-card position-relative">
            <img src="/static/logo.png" alt="AMILCAR" style="display:block;max-height:60px;margin:0 auto 16px;filter:drop-shadow(0 4px 16px rgba(212,175,55,0.2))">
            <p class="reset-title">RÉINITIALISATION</p>
            <p class="reset-user">Utilisateur : {{ username }}</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages" style="margin-bottom:20px">
                {% for category, message in messages %}
                <div class="flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-3">
                    <label class="form-label">Nouveau mot de passe</label>
                    <input type="password" name="new_password" class="form-control" required minlength="6" placeholder="Min. 6 caractères">
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirmer</label>
                    <input type="password" name="confirm_password" class="form-control" required placeholder="Répéter le mot de passe">
                </div>
                <button type="submit" class="btn-gold w-100">CHANGER LE MOT DE PASSE</button>
            </form>
        </div>
    </div>
</body>
</html>
