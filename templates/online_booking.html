<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMILCAR — Réserver en Ligne</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',sans-serif;background:#f8f9fa;color:#333;padding:30px 15px}
        .container{max-width:600px;margin:0 auto}
        .brand{font-family:'Playfair Display',serif;color:#B8860B;font-size:2rem;text-align:center;margin-bottom:5px}
        .tagline{text-align:center;color:var(--text-secondary);font-size:0.8rem;letter-spacing:3px;margin-bottom:30px}
        .booking-card{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.08);padding:35px}
        .booking-card h5{color:#B8860B;font-weight:700;margin-bottom:20px}
        .form-control,.form-select{border:2px solid #eee;border-radius:10px;padding:10px 14px}
        .form-control:focus,.form-select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,0.15)}
        .form-label{font-weight:500;color:var(--text-muted);font-size:0.85rem}
        .btn-gold{background:linear-gradient(135deg,#D4AF37,#B8860B);border:none;color:#fff;font-weight:600;padding:12px;border-radius:10px;width:100%;font-size:1rem}
        .btn-gold:hover{color:#fff;transform:translateY(-2px)}
        .required::after{content:" *";color:#dc3545}
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">AMILCAR</div>
        <div class="tagline">WHERE CARS BECOME ART</div>

        <div class="booking-card">
            <h5>📅 Réserver un Rendez-vous</h5>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}" style="font-size:0.85rem">{{ msg }}</div>
            {% endfor %}{% endif %}
            {% endwith %}

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label required">Nom complet</label>
                        <input type="text" name="name" class="form-control" required placeholder="Votre nom">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label required">Téléphone</label>
                        <input type="tel" name="phone" class="form-control" required placeholder="0612345678">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="email@exemple.com">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Marque</label>
                        <input type="text" name="car_brand" class="form-control" placeholder="BMW, Audi...">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Modèle</label>
                        <input type="text" name="car_model" class="form-control" placeholder="Série 3...">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Immatriculation</label>
                        <input type="text" name="car_plate" class="form-control" placeholder="123 TU 4567">
                    </div>
                    <div class="col-12">
                        <label class="form-label required">Service souhaité</label>
                        <select name="service" class="form-select" required>
                            <option value="">-- Choisir un service --</option>
                            {% for s in services %}
                            <option value="{{ s[0] }}">{{ s[0] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label required">Date souhaitée</label>
                        <input type="date" name="preferred_date" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Heure préférée</label>
                        <input type="time" name="preferred_time" class="form-control" value="09:00">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Notes / Remarques</label>
                        <textarea name="notes" class="form-control" rows="2" placeholder="Informations supplémentaires..."></textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn-gold">📅 Réserver Maintenant</button>
                    </div>
                </div>
            </form>
        </div>
        <p style="text-align:center;color:#aaa;font-size:0.7rem;margin-top:20px">AMILCAR Auto Care — Mahres, Sfax, Tunisia</p>
    </div>
</body>
</html>
