{% extends "base.html" %}
{% block title %} - Page Not Found{% endblock %}
{% block content %}
    <div class="text-center" style="padding:60px 0">
        <h1 style="font-size:5rem;background:linear-gradient(135deg,#D4AF37,#C41E3A);-webkit-background-clip:text;-webkit-text-fill-color:transparent">404</h1>
        <p style="color:var(--text-secondary);letter-spacing:3px;font-size:0.9rem;margin:20px 0">PAGE NOT FOUND</p>
        <p style="color:var(--text-muted);letter-spacing:1px;font-size:0.8rem">The page you are looking for does not exist.</p>
        <a href="/" class="btn-gold mt-4">BACK TO HOME</a>
    </div>
{% endblock %}
