{% extends "base.html" %}
{% block title %} - Modifier Voiture{% endblock %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h4 class="mb-4" >MODIFIER VOITURE</h4>
                <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label class="form-label">MARQUE</label>
                        <input type="text" name="brand" class="form-control" value="{{ car[2] }}" required maxlength="50">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">MODÈLE</label>
                        <input type="text" name="model" class="form-control" value="{{ car[3] }}" required maxlength="50">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">IMMATRICULATION</label>
                        <input type="text" name="plate" class="form-control" value="{{ car[4] }}" required maxlength="20">
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">ANNÉE</label>
                            <input type="text" name="year" class="form-control" value="{{ car[5] if car|length > 5 else '' }}" maxlength="4">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">COULEUR</label>
                            <input type="text" name="color" class="form-control" value="{{ car[6] if car|length > 6 else '' }}" maxlength="30">
                        </div>
                    </div>
                    <button type="submit" class="btn-gold w-100">ENREGISTRER</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
