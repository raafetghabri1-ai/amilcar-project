{% extends "base.html" %}
{% block title %} - Modifier Dépense{% endblock %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h4 class="mb-4" style="color:#D4AF37;letter-spacing:3px">MODIFIER DÉPENSE</h4>
                <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label class="form-label">DATE</label>
                        <input type="date" name="date" class="form-control" value="{{ expense[1] }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">CATÉGORIE</label>
                        <select name="category" class="form-control" required>
                            {% for cat in categories %}
                            <option value="{{ cat }}" {% if expense[2] == cat %}selected{% endif %}>{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">DESCRIPTION</label>
                        <input type="text" name="description" class="form-control" value="{{ expense[3] or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">MONTANT (DT)</label>
                        <input type="number" name="amount" class="form-control" value="{{ expense[4] }}" step="0.01" min="0.01" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-gold flex-grow-1">ENREGISTRER</button>
                        <a href="/expenses" class="btn" style="border:1px solid #555;color:#888;padding:10px 20px">ANNULER</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
