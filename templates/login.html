<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMILCAR - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css?v={{ asset_hash('style.css') }}" rel="stylesheet">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }
        .login-page::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            top: -200px; right: -200px;
            background: radial-gradient(circle, rgba(212,175,55,0.04) 0%, transparent 70%);
            border-radius: 50%;
        }
        .login-page::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            bottom: -150px; left: -150px;
            background: radial-gradient(circle, rgba(229,62,62,0.03) 0%, transparent 70%);
            border-radius: 50%;
        }
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            box-shadow: 0 24px 64px rgba(0,0,0,0.35), var(--shadow-gold);
            animation: scaleIn 0.5s var(--ease-out);
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 0 0 2px 2px;
            opacity: 0.5;
        }
        .login-logo {
            display: block;
            max-height: 70px;
            margin: 0 auto 16px;
            filter: drop-shadow(0 4px 16px rgba(212,175,55,0.2));
        }
        .login-title {
            color: var(--text-primary);
            font-family: var(--font-display);
            text-align: center;
            font-size: 1.15rem;
            letter-spacing: 4px;
            margin-bottom: 4px;
            font-weight: 700;
        }
        .login-subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.72rem;
            letter-spacing: 1.5px;
            margin-bottom: 36px;
        }
        .login-card .form-control {
            padding: 12px 16px;
            font-size: 0.88rem;
        }
        .login-card .form-label {
            font-size: 0.68rem;
        }
        .login-card .btn-gold {
            padding: 13px;
            font-size: 0.88rem;
            letter-spacing: 2px;
        }
        .pwd-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.9rem;
            user-select: none;
            transition: color 0.2s;
            background: none;
            border: none;
            padding: 4px;
        }
        .pwd-toggle:hover { color: var(--gold); }
        @media (max-width: 480px) {
            .login-card { padding: 36px 24px; margin: 0 16px; }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <img src="/static/logo.png" alt="AMILCAR" class="login-logo">
            <p class="login-title">CONNEXION</p>
            <p class="login-subtitle">Bienvenue chez AMILCAR Auto Care</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages" style="margin-bottom:20px">
                {% for category, message in messages %}
                <div class="flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-3">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control" required autofocus placeholder="Entrer votre identifiant">
                </div>
                <div class="mb-4">
                    <label class="form-label">Mot de passe</label>
                    <div class="position-relative">
                        <input type="password" name="password" id="pwd" class="form-control" required style="padding-right:45px" placeholder="••••••••">
                        <button type="button" class="pwd-toggle" onclick="togglePwd('pwd', this)">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn-gold w-100">CONNEXION</button>
                <p style="text-align:center;margin-top:16px;font-size:0.72rem;color:var(--text-muted)">
                    Mot de passe oublié ? <span style="color:var(--gold)">Contactez votre administrateur</span>
                </p>
            </form>
        </div>
    </div>
    <script>
    function togglePwd(id, el) {
        var f = document.getElementById(id);
        if (f.type === 'password') { f.type = 'text'; el.textContent = '🔒'; }
        else { f.type = 'password'; el.textContent = '👁'; }
    }
    </script>
</body>
</html>
