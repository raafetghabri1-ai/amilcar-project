{% extends "base.html" %}
{% block title %} - Modifier Facture{% endblock %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h4 class="mb-4" style="color:#D4AF37;letter-spacing:3px">MODIFIER FACTURE #{{ inv[0] }}</h4>
                <div class="mb-3 p-3" style="background:#1a1a2e;border:1px solid #333;border-radius:6px;">
                    <p style="color:#888;font-size:0.7rem;letter-spacing:2px;margin-bottom:5px">RENDEZ-VOUS</p>
                    <p style="color:#f0f0f0;margin:0"><strong>{{ inv[10] }}</strong> — {{ inv[9] }} ({{ inv[8] }})</p>
                </div>
                <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label class="form-label">MONTANT (DT)</label>
                        <input type="number" name="amount" class="form-control" value="{{ inv[2] }}" step="0.01" min="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">STATUT</label>
                        <select name="status" class="form-control">
                            <option value="unpaid" {% if inv[3] == 'unpaid' %}selected{% endif %}>IMPAYÉ</option>
                            <option value="partial" {% if inv[3] == 'partial' %}selected{% endif %}>PARTIEL</option>
                            <option value="paid" {% if inv[3] == 'paid' %}selected{% endif %}>PAYÉ</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">MODE DE PAIEMENT</label>
                        <select name="payment_method" class="form-control">
                            <option value="" {% if not inv[4] %}selected{% endif %}>—</option>
                            <option value="cash" {% if inv[4] == 'cash' %}selected{% endif %}>Espèces</option>
                            <option value="card" {% if inv[4] == 'card' %}selected{% endif %}>Carte</option>
                            <option value="bank_transfer" {% if inv[4] == 'bank_transfer' %}selected{% endif %}>Banque</option>
                            <option value="check" {% if inv[4] == 'check' %}selected{% endif %}>Chèque</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">REMISE</label>
                        <div class="d-flex gap-2">
                            <select name="discount_type" class="form-control" style="max-width:140px">
                                <option value="">Pas de Remise</option>
                                <option value="percent" {% if inv[6] == 'percent' %}selected{% endif %}>Pourcentage %</option>
                                <option value="fixed" {% if inv[6] == 'fixed' %}selected{% endif %}>Montant Fixe</option>
                            </select>
                            <input type="number" name="discount_value" class="form-control" placeholder="0" step="0.01" min="0" value="{{ inv[7] if inv[7] else 0 }}">
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-gold flex-grow-1">ENREGISTRER</button>
                        <a href="/invoices" class="btn" style="border:1px solid #555;color:#888;padding:10px 20px">ANNULER</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
