<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMILCAR — Réserver</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root{--gold:#D4AF37;--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--text:#f0f0f0;--muted:#888;--border:#2a2a2a;--green:#22c55e;--radius:16px}
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:90px}
        .top-bar{background:var(--bg2);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
        .top-bar h2{color:var(--gold);font-size:1.1rem;font-weight:700;margin:0}
        .top-bar a{color:var(--muted);text-decoration:none;font-size:1.2rem}
        .container-c{max-width:500px;margin:0 auto;padding:16px}
        .form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px}
        .form-card h5{color:var(--gold);font-size:1rem;font-weight:700;margin-bottom:20px;text-align:center}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;color:var(--muted);font-size:.72rem;font-weight:600;letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase}
        .form-group select,.form-group input,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:14px 16px;border-radius:12px;font-size:.9rem;outline:none;transition:border .2s;-webkit-appearance:none}
        .form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:var(--gold)}
        .form-group select option{background:var(--bg3);color:var(--text)}
        .form-group textarea{resize:vertical;min-height:80px}
        .btn-submit{display:block;width:100%;background:var(--gold);color:#000;font-weight:700;border:none;border-radius:12px;padding:16px;font-size:1rem;cursor:pointer;margin-top:24px;letter-spacing:1px}
        .btn-submit:hover{background:#e5c040}
        .flash-msg{background:var(--bg3);border-left:3px solid var(--gold);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:.78rem}
        .flash-danger{border-left-color:#ef4444}
        .service-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
        .service-option{background:var(--bg3);border:2px solid var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;font-size:.78rem}
        .service-option:hover,.service-option.selected{border-color:var(--gold);background:rgba(212,175,55,.08)}
        .service-option .price{color:var(--gold);font-weight:700;font-size:.7rem;margin-top:4px}
        .nav-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 12px;z-index:100}
        .nav-bottom a{color:var(--muted);text-decoration:none;text-align:center;font-size:.55rem;padding:4px 8px}
        .nav-bottom a .ico{font-size:1.2rem;display:block;margin-bottom:2px}
        .nav-bottom a.active{color:var(--gold)}
    </style>
</head>
<body>
<div class="top-bar">
    <a href="/espace-client/accueil">←</a>
    <h2>📅 Réserver</h2>
    <span style="width:20px"></span>
</div>

<div class="container-c">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat, msg in messages %}
    <div class="flash-msg {{ 'flash-danger' if cat=='danger' }}">{{ msg }}</div>
    {% endfor %}{% endif %}{% endwith %}

    <div class="form-card">
        <h5>✨ Nouveau rendez-vous</h5>
        <form method="POST" action="/espace-client/reserver">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label>🚗 Véhicule</label>
                <select name="car_id" required>
                    <option value="">— Sélectionner un véhicule —</option>
                    {% for c in cars %}
                    <option value="{{ c.id }}">{{ c.brand }} {{ c.model }} ({{ c.plate }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>🔧 Service souhaité</label>
                <select name="service_type" id="serviceSelect" required>
                    <option value="">— Choisir un service —</option>
                    {% for s in services %}
                    <option value="{{ s.name }}" data-price="{{ s.price }}">{{ s.name }} — {{ s.price }} DT</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>📅 Date souhaitée</label>
                <input type="date" name="date" required min="{{ now().strftime('%Y-%m-%d') if now is defined else '' }}">
            </div>

            <div class="form-group">
                <label>🕐 Heure préférée</label>
                <select name="time">
                    <option value="">— Pas de préférence —</option>
                    <option value="08:00">08:00</option>
                    <option value="08:30">08:30</option>
                    <option value="09:00">09:00</option>
                    <option value="09:30">09:30</option>
                    <option value="10:00">10:00</option>
                    <option value="10:30">10:30</option>
                    <option value="11:00">11:00</option>
                    <option value="11:30">11:30</option>
                    <option value="12:00">12:00</option>
                    <option value="14:00">14:00</option>
                    <option value="14:30">14:30</option>
                    <option value="15:00">15:00</option>
                    <option value="15:30">15:30</option>
                    <option value="16:00">16:00</option>
                    <option value="16:30">16:30</option>
                    <option value="17:00">17:00</option>
                </select>
            </div>

            <div class="form-group">
                <label>📝 Notes (optionnel)</label>
                <textarea name="notes" placeholder="Décrivez votre besoin..." maxlength="500"></textarea>
            </div>

            <button type="submit" class="btn-submit">Demander un rendez-vous</button>
        </form>
    </div>

    <div style="text-align:center;margin-top:16px;padding:12px">
        <small style="color:var(--muted);font-size:.7rem">Vous recevrez une confirmation par téléphone</small>
    </div>
</div>

<div class="nav-bottom">
    <a href="/espace-client/accueil"><span class="ico">🏠</span>Accueil</a>
    <a href="/espace-client/vehicules"><span class="ico">🚗</span>Véhicules</a>
    <a href="/espace-client/reserver" class="active"><span class="ico">📅</span>Réserver</a>
    <a href="/espace-client/factures"><span class="ico">📄</span>Factures</a>
    <a href="/espace-client/fidelite"><span class="ico">🎁</span>Fidélité</a>
</div>
</body>
</html>
