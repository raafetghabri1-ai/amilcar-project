<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>اضافة فاتورة - amilcar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f8f9fa">
    <div style="background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;padding:40px;text-align:center">
        <h2>مركز amilcar لعناية السيارات</h2>
    </div>
    <nav class="navbar navbar-dark" style="background:#16213e">
        <div class="container"><div class="navbar-nav mx-auto">
            <a class="nav-link text-white" href="/">الرئيسية</a>
            <a class="nav-link text-white" href="/customers">العملاء</a>
            <a class="nav-link text-white" href="/appointments">المواعيد</a>
            <a class="nav-link text-white" href="/invoices">الفواتير</a>
        </div></div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow">
                    <h4 class="mb-4">اضافة فاتورة جديدة</h4>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">رقم الموعد</label>
                            <input type="number" name="appointment_id" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">المبلغ (DT)</label>
                            <input type="number" name="amount" class="form-control" step="0.1" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">اضافة الفاتورة</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
