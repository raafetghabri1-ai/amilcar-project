{% extends "base.html" %}
{% block title %} - Ajouter Facture{% endblock %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4" style="animation:fadeInUp 0.4s var(--ease-out)">
                <h4 class="page-title mb-4">Ajouter Facture</h4>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label class="form-label">Rendez-vous</label>
                        <select name="appointment_id" class="form-control" required>
                            {% for a in appointments %}
                            <option value="{{ a[0] }}">{{ a[1] }} — {{ a[5] }} — {{ a[4] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Montant (DT)</label>
                        <input type="number" name="amount" class="form-control" placeholder="150" step="0.01" min="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Remise</label>
                        <div class="d-flex gap-2">
                            <select name="discount_type" class="form-control" style="max-width:160px">
                                <option value="">Pas de remise</option>
                                <option value="percent">Pourcentage %</option>
                                <option value="fixed">Montant fixe</option>
                            </select>
                            <input type="number" name="discount_value" class="form-control" placeholder="0" step="0.01" min="0" value="0">
                        </div>
                    </div>
                    <button type="submit" class="btn-gold w-100" style="padding:12px">Ajouter Facture</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
