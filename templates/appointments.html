<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>المواعيد - amilcar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .hero { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 40px 0; text-align: center; }
        thead { background: #1a1a2e; color: white; }
    </style>
</head>
<body>
    <div class="hero"><h2>🚗 مركز amilcar لعناية السيارات</h2></div>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#16213e">
        <div class="container">
            <div class="navbar-nav mx-auto">
                <a class="nav-link text-white" href="/">🏠 الرئيسية</a>
                <a class="nav-link text-white" href="/customers">👤 العملاء</a>
                <a class="nav-link text-white" href="/appointments">📅 المواعيد</a>
                <a class="nav-link text-white" href="/invoices">💰 الفواتير</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h4 class="mb-3">📅 قائمة المواعيد</h4>
        <table class="table table-hover">
            <thead><tr><th>الرقم</th><th>العميل</th><th>السيارة</th><th>التاريخ</th><th>الخدمة</th><th>الحالة</th></tr></thead>
            <tbody>
            {% for a in appointments %}
            <tr><td>{{ a[0] }}</td><td>{{ a[1] }}</td><td>{{ a[2] }} {{ a[3] }}</td><td>{{ a[4] }}</td><td>{{ a[5] }}</td><td><span class="badge bg-warning">{{ a[6] }}</span></td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
