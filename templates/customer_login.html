<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMILCAR — Espace Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',sans-serif;background:#f8f9fa;color:#333;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .login-card{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.08);padding:40px;max-width:420px;width:100%}
        .brand{font-family:'Playfair Display',serif;color:#B8860B;font-size:1.8rem;text-align:center;margin-bottom:8px}
        .subtitle{text-align:center;color:#888;font-size:0.9rem;margin-bottom:30px}
        .form-control{border:2px solid #eee;border-radius:10px;padding:12px 16px;font-size:1rem;transition:border-color .3s}
        .form-control:focus{border-color:#D4AF37;box-shadow:0 0 0 3px rgba(212,175,55,0.15)}
        .btn-gold{background:linear-gradient(135deg,#D4AF37,#B8860B);border:none;color:#fff;font-weight:600;padding:12px;border-radius:10px;width:100%;font-size:1rem;transition:transform .2s}
        .btn-gold:hover{transform:translateY(-2px);color:#fff}
        .error-msg{background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:8px;padding:10px 16px;font-size:0.85rem;margin-bottom:16px;text-align:center}
        .footer-text{text-align:center;color:#aaa;font-size:0.75rem;margin-top:20px}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">AMILCAR</div>
        <div class="subtitle">Espace Client — Connexion</div>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/client/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="mb-3">
                <label class="form-label" style="font-weight:500;color:#555">📱 Numéro de Téléphone</label>
                <input type="tel" name="phone" class="form-control" placeholder="Ex: 0612345678" required autofocus>
            </div>
            <button type="submit" class="btn btn-gold">Se Connecter</button>
        </form>
        <div class="footer-text">Connectez-vous avec le numéro enregistré chez AMILCAR</div>
    </div>
</body>
</html>
