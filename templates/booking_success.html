<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMILCAR — Réservation Confirmée</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',sans-serif;background:#f8f9fa;color:#333;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .success-card{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.08);padding:50px;max-width:450px;width:100%;text-align:center}
        .brand{font-family:'Playfair Display',serif;color:#B8860B;font-size:1.6rem;margin-bottom:20px}
        .check{font-size:4rem;margin-bottom:15px}
        .info{background:#fdf6e3;border-radius:10px;padding:15px;margin:20px 0;text-align:left}
        .info-row{display:flex;justify-content:space-between;padding:4px 0;font-size:0.85rem}
        .info-row span:first-child{color:var(--text-secondary)}
        .info-row span:last-child{font-weight:600;color:#B8860B}
    </style>
</head>
<body>
    <div class="success-card">
        <div class="brand">AMILCAR</div>
        <div class="check">✅</div>
        <h4 style="color:var(--green);margin-bottom:10px">Réservation Enregistrée !</h4>
        <p style="color:var(--text-secondary);font-size:0.9rem">Merci {{ name }}, votre demande a été reçue.</p>
        <div class="info">
            <div class="info-row"><span>Date souhaitée</span><span>{{ date }}</span></div>
            {% if time %}<div class="info-row"><span>Heure</span><span>{{ time }}</span></div>{% endif %}
        </div>
        <p style="color:var(--text-secondary);font-size:0.8rem">Nous vous contacterons pour confirmer votre rendez-vous.</p>
        <a href="/book" style="color:#B8860B;font-weight:600;text-decoration:none">← Nouvelle réservation</a>
    </div>
</body>
</html>
