# ═══════════════════════════════════════════════════════════════
# AMILCAR — Nginx Reverse Proxy Configuration
# ═══════════════════════════════════════════════════════════════
# 
# Installation:
#   1. sudo apt install nginx
#   2. sudo cp nginx.conf /etc/nginx/sites-available/amilcar
#   3. sudo ln -s /etc/nginx/sites-available/amilcar /etc/nginx/sites-enabled/
#   4. sudo rm /etc/nginx/sites-enabled/default
#   5. sudo nginx -t && sudo systemctl restart nginx
#
# For HTTPS (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com
#
# For local network (no domain), use self-signed cert:
#   sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/ssl/private/amilcar.key \
#     -out /etc/ssl/certs/amilcar.crt \
#     -subj "/CN=amilcar.local"
# ═══════════════════════════════════════════════════════════════

upstream amilcar_app {
    server 127.0.0.1:5000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # SSL — Replace with Let's Encrypt paths when available
    ssl_certificate /etc/ssl/certs/amilcar.crt;
    ssl_certificate_key /etc/ssl/private/amilcar.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Request limits
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Static files — served directly by Nginx (faster)
    location /static/ {
        alias /home/raaft/amilcar/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Favicon
    location /favicon.ico {
        alias /home/raaft/amilcar/static/icons/icon-192.png;
        expires 30d;
    }

    # PWA files
    location /manifest.json {
        alias /home/raaft/amilcar/static/manifest.json;
        add_header Content-Type "application/manifest+json";
    }

    location /sw.js {
        alias /home/raaft/amilcar/static/sw.js;
        add_header Content-Type "application/javascript";
        expires -1;
    }

    # Application — proxy to Gunicorn
    location / {
        proxy_pass http://amilcar_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        # WebSocket support (for future real-time features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Block sensitive paths
    location ~ /\. { deny all; }
    location ~ \.py$ { deny all; }
    location ~ \.db$ { deny all; }
    location /database { deny all; }
    location /__pycache__ { deny all; }

    # Logs
    access_log /var/log/nginx/amilcar_access.log;
    error_log /var/log/nginx/amilcar_error.log;
}
