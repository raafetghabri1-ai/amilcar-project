services:
  - type: web
    name: amilcar-project
    runtime: python
    pythonVersion: "3.12.0"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --bind 0.0.0.0:$PORT --timeout 120 app:app"
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATA_DIR
        value: /opt/render/project/data
    disk:
      name: amilcar-data
      mountPath: /opt/render/project/data
      sizeGB: 1
