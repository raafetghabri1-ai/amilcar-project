name: AMILCAR CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask flask-wtf flask-socketio gunicorn weasyprint pytest
    
    - name: Run tests
      run: python -m pytest tests/ -v
    
    - name: Check for syntax errors
      run: python -m py_compile app.py && echo "✅ No syntax errors"
