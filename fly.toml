# fly.toml — AMILCAR Auto Care
# Generated for Fly.io deployment

app = "amilcar-autocare"
primary_region = "cdg"   # Paris — أقرب لتونس

[build]
  dockerfile = "Dockerfile"

[env]
  FLASK_ENV = "production"
  PORT = "8080"
  DATA_DIR = "/data"
  CORS_ORIGINS = "https://amilcar.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume for SQLite DB + uploads
[[mounts]]
  source = "amilcar_data"
  destination = "/data"
  initial_size = "1gb"

[checks]
  [checks.alive]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/book"
    port = 8080
    timeout = "10s"
    type = "http"
